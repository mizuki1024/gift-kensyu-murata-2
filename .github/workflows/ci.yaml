name: CI Pipeline

on:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: pnpmのセットアップ
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Node.jsのセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: パッケージのインストール
        run: pnpm install

      - name: 構文チェック (ESLint)
        run: pnpm lint

      - name: 型チェック (TypeScript)
        run: pnpm type-check

      - name: 動作テスト (Vitest)
        run: pnpm test

      - name: ビルド (Build)
        run: pnpm build